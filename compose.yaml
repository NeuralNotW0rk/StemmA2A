services:
  execution-engine:
    build:
      context: ./backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./backend:/app
    environment:
      PYTHONUNBUFFERED: 1
    networks:
      - app-net

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN?Cloudflare Tunnel token is not set}
    depends_on:
      - execution-engine
    networks:
      - app-net

networks:
  app-net:
    driver: bridge