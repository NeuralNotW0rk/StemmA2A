services:
  execution-engine:
    build:
      context: ./backend
    image: execution-engine:latest
    shm_size: '8gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./backend:/app          # Maps your code folder
      - ${LOCAL_DATA_PATH}:${CONTAINER_DATA_PATH}
      - ${LOCAL_DIFFRACTURE_PATH:-../Diffracture}:/Diffracture
    environment:
      PYTHONUNBUFFERED: 1
      RUNNING_IN_CONTAINER: "true"
      CONTAINER_DATA_PATH: ${CONTAINER_DATA_PATH}
      TORCH_HOME: "/app/data/torch"
      OMP_NUM_THREADS: 4
      MKL_NUM_THREADS: 4
      HF_HOME: "/app/data/huggingface"
      TRITON_CACHE_DIR: "/app/data/triton"
      HF_HUB_OFFLINE: "1"
    networks:
      - app-net

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN?Cloudflare Tunnel token is not set}
    depends_on:
      - execution-engine
    networks:
      - app-net

networks:
  app-net:
    driver: bridge